x-aion-runtime-env: &aion-runtime-env
  APP_ENV: production
  APP_BUILD_REVISION: ${SOURCE_COMMIT:-unknown}
  DEPLOYMENT_TRIGGER_MODE: ${DEPLOYMENT_TRIGGER_MODE:-source_automation}
  APP_PORT: 8000
  LOG_LEVEL: INFO
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
  EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
  TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://aion:aion@db:5432/aion}
  REFLECTION_RUNTIME_MODE: ${REFLECTION_RUNTIME_MODE:-deferred}
  SCHEDULER_EXECUTION_MODE: ${SCHEDULER_EXECUTION_MODE:-externalized}
  ATTENTION_COORDINATION_MODE: ${ATTENTION_COORDINATION_MODE:-durable_inbox}
  PROACTIVE_ENABLED: ${PROACTIVE_ENABLED:-true}
  REFLECTION_INTERVAL: ${REFLECTION_INTERVAL:-900}
  MAINTENANCE_INTERVAL: ${MAINTENANCE_INTERVAL:-3600}
  PROACTIVE_INTERVAL: ${PROACTIVE_INTERVAL:-1800}
  CADENCE_FAILURE_RETRY_SECONDS: ${CADENCE_FAILURE_RETRY_SECONDS:-30}

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        APP_BUILD_REVISION: ${SOURCE_COMMIT:-unknown}
    environment: *aion-runtime-env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  maintenance_cadence:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        APP_BUILD_REVISION: ${SOURCE_COMMIT:-unknown}
    environment: *aion-runtime-env
    depends_on:
      db:
        condition: service_healthy
    command:
      [
        "sh",
        "-lc",
        "while true; do if python scripts/run_maintenance_tick_once.py; then sleep ${MAINTENANCE_INTERVAL:-3600}; else sleep ${CADENCE_FAILURE_RETRY_SECONDS:-30}; fi; done",
      ]

  proactive_cadence:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        APP_BUILD_REVISION: ${SOURCE_COMMIT:-unknown}
    environment: *aion-runtime-env
    depends_on:
      db:
        condition: service_healthy
    command:
      [
        "sh",
        "-lc",
        "while true; do if python scripts/run_proactive_tick_once.py; then sleep ${PROACTIVE_INTERVAL:-1800}; else sleep ${CADENCE_FAILURE_RETRY_SECONDS:-30}; fi; done",
      ]

  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: aion
      POSTGRES_USER: aion
      POSTGRES_PASSWORD: aion
    volumes:
      - aion_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aion -d aion"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aion_db_data:
