services:
  db:
    image: postgres:15
    container_name: aion-db
    environment:
      POSTGRES_DB: aion
      POSTGRES_USER: aion
      POSTGRES_PASSWORD: aion
    ports:
      - "5432:5432"
    volumes:
      - aion_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aion -d aion"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: aion-app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./backend:/app/backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  aion_db_data:
